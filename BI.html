/* =============================================================
   Section frame — every BI sample sits inside one
   ============================================================= */
function BISection({ idx, name, descr, children }) {
  return (
    <section style={{
      padding: "44px 0",
      borderTop: `1px solid ${hair}`,
    }}>
      <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: 56, marginBottom: 28 }}>
        <div>
          <Stamp m style={{ display: "block", marginBottom: 8 }}>0{idx} · BI component</Stamp>
          <h2 style={{
            fontFamily: display, fontWeight: 500,
            fontSize: 32, letterSpacing: "-0.02em",
            margin: 0, lineHeight: 1.05,
          }}>{name}</h2>
        </div>
        <p style={{
          fontFamily: bodyFont, fontSize: 14.5,
          color: mute, lineHeight: 1.55, margin: 0,
          maxWidth: "60ch", textWrap: "pretty",
        }}>{descr}</p>
      </div>
      {children}
    </section>
  );
}

          title="Six-year graduation · R1 Private (22)"
          sub="Sorted descending. The diamond on each bar is the peer-cohort average."
          rows={RANKING_ROWS}
          peerAvgPct={92}
          maxBarPct={100}
        />
      </BISection></div>

      <div id="bi-5"><BISection idx={5} name="Small multiples" descr="The scorecard view: 8–12 micro-tiles, each a self-contained KPI with sparkline and peer line. Cards flagged in teal whenever the metric is in the top quartile of the cohort.">
        <BISmallMultiples
          stamp="FY25 scorecard"
          title="Operational scorecard · 8 metrics × peer cohort"
          sub="Top-quartile metrics get the teal frame so the eye finds outliers first."
          items={SMALL_MULTI}
        />
      </BISection></div>

      <div id="bi-6"><BISection idx={6} name="Composition" descr="Stacked twin bars — you vs peer mix — paired with a category-level table that shows percentages and the delta from peer for each segment.">
        <BIComposition
          stamp="Revenue mix · FY25"
          title="Where the operating dollars come from"
          sub="Your mix is more tuition-dependent and less endowment-supported than the cohort. The category table makes the gap explicit."
          segments={COMP_SEGMENTS}
          you={{ tuition: 48, state: 18, endow: 14, gifts: 12, other: 8 }}
          peer={{ tuition: 38, state: 22, endow: 22, gifts: 14, other: 4 }}
        />
      </BISection></div>

      <div id="bi-7"><BISection idx={7} name="Funnel" descr="Stage-by-stage conversion. Each row has a peer baseline bar with you overlaid in teal; the conversion line beneath shows where your rate diverges from the cohort.">
        <BIFunnel
          stamp="Fall 2025 cycle"
          title="Admissions funnel · stage-by-stage"
          sub="Conversions between rows are mono-caps lines, so the deltas read as numbers, not glyphs."
          stages={FUNNEL_STAGES}
        />
      </BISection></div>

      <div id="bi-8"><BISection idx={8} name="Gauge" descr="Half-arc against a peer P25–P75 band with a diamond at peer median and a teal needle for you. Best used in 3-up rows.">
        <BIGauge
          stamp="Goal tracking · vs peer"
          title="Where you sit on three watch metrics"
          sub="Gauges are a tactical read — fast comparison against a known band. Use them sparingly; they don't carry trend."
          gauges={[
            { label: "4-year graduation", value: 87.2, unit: "%", delta: "▲ 2.1 vs LY", deltaDir: "up",
              min: 70, max: 95, peerBand: [78, 86], peerMedian: 81, you: 87, peerNote: "81% · +6.4" },
            { label: "Yield rate",        value: 42.1, unit: "%", delta: "— flat vs LY", deltaDir: "flat",
              min: 30, max: 58, peerBand: [40, 48], peerMedian: 43, you: 42, peerNote: "43% · −1.2" },
            { label: "Cost per FTE (low better)", value: "$48.4", unit: "k", delta: "▼ 1.8% vs LY", deltaDir: "warn",
              min: 35, max: 65, peerBand: [42, 48], peerMedian: 45, you: 48.4, peerNote: "$45.3k · +$3.1" },
          ]}
        />
      </BISection></div>

      <div id="bi-9"><BISection idx={9} name="Waterfall" descr="Bridge from peer average → you. Green steps add, crimson steps subtract. The final bar is teal — the answer. Drop it whenever you owe someone an explanation of a gap.">
        <BIWaterfall
          stamp="Net-revenue bridge"
          title="What drives your $3.4k revenue lead per FTE?"
          sub="Bridge starts at the peer-cohort average and walks through each driver until it lands on you."
          start={WATERFALL.start}
          end={WATERFALL.end}
          steps={WATERFALL.steps}
          unit="$"
        />
      </BISection></div>

      <div id="bi-10"><BISection idx={10} name="Sankey" descr="Cohort flow. Your flows in teal sit over peer-cohort flows in low-opacity ink, so divergences pop. Best for cohort or revenue allocation problems where shape matters more than magnitude.">
        <BISankey
          stamp="Cohort flow · entered Fall 2021"
          title="Where your students go · 4-year cohort"
          sub="Same five entry types, same five outcomes. Teal flows are you; ink flows are the peer-cohort average."
          {...SANKEY_DATA}
        />
      </BISection></div>

      <div id="bi-11"><BISection idx={11} name="Quadrant scatter" descr="Two metrics at once with a quadrant labelling system — efficient frontier, expensive/high-outcome, etc. You're a teal halo; peers are mute ink dots; peer-average is a crosshair.">
        <BIQuadrant
          stamp="Two-dimensional position"
          title="Cost per FTE × six-year graduation"
          sub="Quadrants reveal the efficient-frontier story: high outcome at moderate cost is upper-left."
          right={<YouCallout label="Q2 · Efficient" />}
          xRange={[32, 64]} yRange={[75, 95]}
          xLabel="Cost per FTE ($k)" yLabel="Grad rate (%)"
          peers={QUADRANT_PEERS}
          you={[44, 94, "$44k · 94%"]}
          peerAvg={[48, 84]}
          quadrantLabels={{
            tl: "EFFICIENT · HIGH OUTCOME",
            tr: "EXPENSIVE · HIGH OUTCOME",
            bl: "LOW COST · LOW OUTCOME",
            br: "EXPENSIVE · LOW OUTCOME",
          }}
        />
      </BISection></div>

      <div id="bi-12"><BISection idx={12} name="Geographic map" descr="Tile-grid US choropleth. Ink ramp for share; teal ramp on states where you over-index vs the cohort. Your home state gets the bold teal tile. International applicants live in their own card — the US shape stays US-only.">
        <BIGeoMap
          stamp="Source geography · domestic"
          title="Where your applicants come from"
          sub="Each tile is a state; shading is your share of applications. Tiles in teal are states where you over-index vs the peer-cohort average. AK and HI sit in the lower-left as outliers."
          cells={GEO_CELLS}
          side={GEO_SIDE}
        />
        {/* International — separate card so the US tilegram is uncluttered */}
        <div style={{ marginTop: 18 }}>
          <Paper pad="24px 28px">
            <BISectionHead
              stamp="Source geography · international"
              title="Applicants from abroad"
              sub="2,840 applications from 64 countries · 11% of total · ▲ 3 pp YoY"
              right={<YouCallout label="P74 · over-indexes vs peer" />}
            />
            <div style={{
              display: "grid", gridTemplateColumns: "1fr 1fr",
              gap: 28, alignItems: "start",
            }}>
              {/* Left: top countries list */}
              <div>
                <Stamp m style={{ display: "block", marginBottom: 10 }}>Top source countries</Stamp>
                {INTL_COUNTRIES.map((c, i) => (
                  <div key={c.name} style={{
                    display: "grid", gridTemplateColumns: "24px 1fr 60px",
                    alignItems: "center", gap: 10,
                    padding: "10px 0",
                    borderTop: i === 0 ? "none" : `1px solid ${hair}`,
                  }}>
                    <span style={{
                      fontFamily: mono, fontSize: 10,
                      color: mute, letterSpacing: "0.04em",
                    }}>{String(c.rank).padStart(2,"0")}</span>
                    <span style={{
                      fontFamily: bodyFont, fontSize: 13, color: ink,
                    }}>{c.name}</span>
                    <span style={{
                      fontFamily: mono, fontSize: 12,
                      color: ink, fontWeight: 500, textAlign: "right",
                    }}>{c.value}</span>
                  </div>
                ))}
              </div>
              {/* Right: regional rollup as a tiny donut */}
              <BIDonut
                stamp="Region mix"
                title=""
                sub=""
                segments={[
                  { key: "asia",   label: "East/South Asia", value: 58, focal: true },
                  { key: "europe", label: "Europe / UK",     value: 16 },
                  { key: "na",     label: "Canada / Mexico", value: 11 },
                  { key: "latam",  label: "Latin America",   value:  8 },
                  { key: "africa", label: "Africa / ME",     value:  7 },
                ]}
                centerValue="2,840"
                centerLabel="intl. apps"
                size={200}
              />
            </div>
          </Paper>
        </div>
        {/* International admissions funnel — the journey, not the geography */}
        <div style={{ marginTop: 18 }}>
          <BIFunnelChart
            stamp="International admissions · Fall 2025"
            title="From application to enrolment"
            sub="The journey for international applicants. Dashed outlines are the peer-cohort conversion rates at each stage."
            right={<YouCallout label="+2 pp yield vs peer" />}
            stages={[
              { label: "Applications", sub: "64 countries",       value: 2840, peerValue: 2480 },
              { label: "Admitted",     sub: "19% admit rate",     value:  540, peerValue:  496 },
              { label: "Yielded",      sub: "46% yield",          value:  248, peerValue:  218 },
              { label: "Enrolled",     sub: "97% retained",       value:  240, peerValue:  212 },
            ]}
          />
        </div>
      </BISection></div>

      <div id="bi-13"><BISection idx={13} name="Cohort heatmap" descr="Institutions × metrics, percentile-coded as cell tone. Your row is highlighted in teal; the peer rows use the ink ramp. Best when you want the full cohort matrix on one screen.">
        <BIHeatmap
          stamp="Cohort matrix · 8 metrics × 6 peers"
          title="Performance matrix"
          sub="Cell colour is percentile within the cohort. Your row sits on top in teal."
          columns={["Grad rate","Retention","Yield","Endow / FTE","Cost / FTE","Selectivity","Faculty ratio","Research $"]}
          rows={HEATMAP_ROWS}
        />
      </BISection></div>

      <div id="bi-14"><BISection idx={14} name="Bullet chart" descr="Stephen Few's design. One bar against three qualitative bands (poor / ok / good), with a target tick. More honest than a gauge and half the ink. Reads inline.">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0,1fr))", gap: 18 }}>
          <BIBullet
            label="Six-year graduation"
            value={94} unit="%"
            target={92}
            ranges={[70, 80, 90, 100]}
            peerLabel="R1 Private median" peerValue="86%"
            showLegend
          />
          <BIBullet
            label="Pell grad rate"
            value={92} unit="%"
            target={85}
            ranges={[55, 70, 85, 100]}
            peerLabel="R1 Private median" peerValue="78%"
          />
          <BIBullet
            label="FY26 fundraising"
            value={73} unit="%"
            target={100}
            ranges={[0, 50, 85, 110]}
            peerLabel="Aspirational peers" peerValue="68%"
          />
          <BIBullet
            label="Net tuition per FTE"
            value={22.8} unit="k"
            target={20}
            ranges={[12, 18, 22, 28]}
            peerLabel="R1 Private median" peerValue="$20.4k"
          />
        </div>
      </BISection></div>

      <div id="bi-15"><BISection idx={15} name="Big number" descr="Pure type, no chart. Massive display numeral, label, one paragraph of context. For when the headline IS the chart and adding a sparkline would weaken it.">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0,1fr))", gap: 18 }}>
          <BIBigNumber
            label="Six-year graduation"
            value="94" unit="%"
            delta="▲ +0.6 pp YoY · +8 pp vs peer median" deltaDir="up"
            context="Two points above the peer p75 band. Lift is driven by Pell grad rate (+1.1 pp) and URM gap closure (+0.8 pp) — the underlying movement is doing more work than the headline."
            peerLabel="R1 Private (22)"
            peerValue="median 86%"
          />
          <BIBigNumber
            label="First-year retention"
            value="98" unit="%"
            delta="▲ +0.2 pp YoY" deltaDir="up"
            context="Highest in the peer set. Transfer-out has dropped 0.3 pp in the same window, which means retention is now absorbing students who would historically have left."
            peerLabel="R1 Private (22)"
            peerValue="median 93%"
          />
        </div>
      </BISection></div>

      <div id="bi-16"><BISection idx={16} name="Compare bar" descr="Two stacked horizontal bars (you / peer) with labels at each end. Simpler than Composition when there's only one metric, simpler than Ranking when there are only two rows.">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0,1fr))", gap: 18 }}>
          <BICompareBar
            label="Six-year graduation" unit="%"
            youValue={94} youLabel="Stanford"
            peerValue={86} peerLabel="R1 Private (22)"
            max={100}
          />
          <BICompareBar
            label="Net tuition per FTE" unit="k"
            youValue={22.8} youLabel="Stanford"
            peerValue={20.4} peerLabel="R1 Private (22)"
            max={28}
          />
          <BICompareBar
            label="Endowment per student" unit="k"
            youValue={684} youLabel="Stanford"
            peerValue={498} peerLabel="R1 Private (22)"
            max={800}
          />
          <BICompareBar
            label="Cost per FTE (low better)" unit="k"
            youValue={48.4} youLabel="Stanford"
            peerValue={45.3} peerLabel="R1 Private (22)"
            max={60}
          />
        </div>
      </BISection></div>

      <div id="bi-17"><BISection idx={17} name="Stat strip" descr="A row of inline stats, hairline-divided, no charts. Use as a section anchor or as the masthead vitals strip on a dashboard.">
        <BIStatStrip
          stamp="FY25 vitals · 06 signals"
          items={[
            { label: "Total headcount",   value: "17.5", unit: "k",  delta: "+0.4 k YoY", deltaDir: "up", peerLabel: "R1 median",        peerValue: "14.2 k" },
            { label: "Six-year grad",     value: "94",   unit: "%",  delta: "+0.6 pp YoY", deltaDir: "up", peerLabel: "R1 median",        peerValue: "86%"     },
            { label: "First-year retention",value: "98", unit: "%",  delta: "+0.2 pp YoY", deltaDir: "up", peerLabel: "R1 median",        peerValue: "93%"     },
            { label: "Net tuition / FTE",  value: "$54.2",unit: "k", delta: "+$1.1k YoY",  deltaDir: "up", peerLabel: "R1 median",        peerValue: "$42k"    },
            { label: "Faculty FTE",        value: "2,180",unit: "",  delta: "+38 YoY",     deltaDir: "up", peerLabel: "R1 median",        peerValue: "1,640"   },
            { label: "Endowment",          value: "$36.5",unit: "B", delta: "+2.1 % YoY",  deltaDir: "up", peerLabel: "R1 median",        peerValue: "$7.4B"   },
          ]}
        />
      </BISection></div>

      <div id="bi-18"><BISection idx={18} name="Variance bars" descr="Divergent bars centred on zero — each row swings positive or negative from a baseline. Best for a movements-vs-baseline list (peer median, prior year, target).">
        <BIVariance
          stamp="Stanford vs R1 Private median"
          title="Where the lead sits"
          sub="Each row is your delta from the peer median. Crimson = below; green = above. Cost is shown as a warm tone because higher is worse."
          range={[-6, 16]}
          unit=" pp"
          baselineLabel="= peer median"
          items={[
            { name: "Six-year graduation",       delta:  8.0 },
            { name: "First-year retention",      delta:  5.0 },
            { name: "Pell grad rate",            delta: 14.0 },
            { name: "URM gap closure",           delta:  3.8 },
            { name: "Transfer-out (low better)", delta: -2.7 },
            { name: "Yield",                     delta: -1.2 },
            { name: "Cost per FTE",              delta:  3.1, dir: "warn" },
          ]}
        />
      </BISection></div>

      <div id="bi-19"><BISection idx={19} name="Progress to goal" descr="Single bar from 0 to target. Teal fill = current; ink tick = where you should be today. The only goal-oriented shape in the kit.">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0,1fr))", gap: 18 }}>
          <BIProgress
            label="FY26 campaign · $1B goal"
            value={734} target={1000}
            display="$734M of $1B raised"
            pace={68}
            paceLabel="pace · 68% by 18 May"
            delta="▲ +$48M in May · above pace"
          />
          <BIProgress
            label="FY26 enrolment to plan"
            value={1620} target={1740}
            display="1,620 of 1,740 deposits"
            pace={96}
            paceLabel="pace · 96% by 18 May"
            delta="▼ −2.9 pp behind pace · follow-up window through 1 June"
          />
        </div>
      </BISection></div>

      <div id="bi-20"><BISection idx={20} name="Donut / pie" descr="Ring (or pie when hole={0}) with a center value, paired with a category table. Use for true part-to-whole questions — share of revenue, share of awards, share of applicants. Stick to ≤5 segments; beyond that the eye loses the count and a bar chart is honestly better.">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22 }}>
          <BIDonut
            stamp="FY25 · awards by level"
            title="Awards conferred by degree"
            sub="Donut variant. The focal slice is bachelor's; rest in the ink ramp."
            segments={[
              { key: "ba",   label: "Bachelor's",          value: 1740, focal: true },
              { key: "ma",   label: "Master's",            value:  820 },
              { key: "phd",  label: "Doctorate",           value:  340 },
              { key: "prof", label: "Professional",        value:  210 },
              { key: "cert", label: "Certificate",         value:  120 },
            ]}
            centerValue="3,230"
            centerLabel="awards · FY25"
            peer={{ ba: 56, ma: 22, phd: 9, prof: 8, cert: 5 }}
          />
          <BIDonut
            stamp="FY25 · operating revenue"
            title="Where the dollars come from"
            sub="Pie variant (hole={0}). Net tuition is the focal slice; mix vs peer in the right column."
            hole={0}
            segments={[
              { key: "tuition", label: "Net tuition & fees", value: 48, focal: true },
              { key: "state",   label: "State appropriation", value: 18 },
              { key: "endow",   label: "Endowment payout",    value: 14 },
              { key: "gifts",   label: "Gifts & grants",      value: 12 },
              { key: "other",   label: "Auxiliary & other",   value:  8 },
            ]}
            peer={{ tuition: 38, state: 22, endow: 22, gifts: 14, other: 4 }}
          />
        </div>
      </BISection></div>

      <PageFooter
        left="Paper Kit · BI library · 20 components"
        right="Drawn 18 may 2026"
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
