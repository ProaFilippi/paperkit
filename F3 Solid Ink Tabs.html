<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Left Tabs · F3 · Solid ink, staggered close</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  /* ============================================================
     Tokens — paper-kit register
     ============================================================ */
  :root {
    --ink:       #0E0E0E;
    --mute:      #6E6E73;
    --desk:      #FAFAF7;
    --paper:     #FFFFFF;
    --hair:      rgba(14,14,14,0.10);
    --teal:      #4A8580;

    --font-display: "Space Grotesk", "Inter", system-ui, sans-serif;
    --font-body:    "Inter", "Helvetica Neue", system-ui, sans-serif;
    --font-mono:    "JetBrains Mono", ui-monospace, monospace;

    /* Highlighter swipe — used behind the active tab label */
    --hl: linear-gradient(
      100deg,
      rgba(74,133,128,0)    0%,
      rgba(74,133,128,0.55) 8%,
      rgba(74,133,128,0.48) 55%,
      rgba(74,133,128,0.18) 92%,
      rgba(74,133,128,0)    100%
    );
    --paper-shadow:
      0 1px  2px rgba(14,14,14,0.04),
      0 8px 20px -6px rgba(14,14,14,0.08),
      0 24px 40px -18px rgba(14,14,14,0.12);
  }

  html, body, #root { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--desk);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  *, *::before, *::after { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/* ============================================================
   F3 · Solid ink left-tabs · staggered close
   ------------------------------------------------------------
   Pattern:
     • Rail starts narrow (icon-only).
     • On rail-hover ENTER: every tab opens together (labels reveal).
     • On rail-hover LEAVE: inactive tabs collapse immediately,
       the active tab stays open for ~220ms, then collapses too.
       → a quick eye-cue on what was selected before everything
         tucks back to icons.
     • Active tab:
        - paper-white fill (vs warm-tan inactive bg)
        - overhangs LEFT by 8 px (visible past the rail)
        - pokes UNDER the paper edge by 4 px (seamless join)
        - subtle drop-shadow halo, clipped so it can't bleed
          onto the white paper
        - bold mono label with the teal highlighter swipe behind it

   Sizes assume a frame ~640×540. Adjust F.PAPER_LEFT and
   F.RAIL_TOP if you reuse this in a different container.
   ============================================================ */
const { useState, useEffect } = React;

const T = {
  ink:   "#0E0E0E",
  mute:  "#6E6E73",
  paper: "#FFFFFF",
  hair:  "rgba(14,14,14,0.10)",
  fontDisplay: 'var(--font-display)',
  fontBody:    'var(--font-body)',
  fontMono:    'var(--font-mono)',
  hl:          'var(--hl)',
  paperShadow: 'var(--paper-shadow)',
};

const F = {
  TAB_H:              36,
  COLLAPSED_W:        36,
  EXPANDED_W:        148,
  ACTIVE_OUT:          8,   // px the active tab extends LEFT past the rail
  ACTIVE_INTO_PAPER:   4,   // px the active tab pokes UNDER the paper edge
  PAPER_LEFT:        192,   // gives room for the expanded rail
  RAIL_TOP:           64,
  EASE:               'cubic-bezier(.22,.61,.36,1)',
  DUR:                220,
  INACTIVE_BG:        '#EBE7DD',
  HOVER_BG:           '#E2DDD0',
  ACTIVE_OPEN_HOLD:   220,  // ms the active tab lingers open on leave
};

const TABS = [
  { id: 'overview', label: 'Overview' },
  { id: 'faculty',  label: 'Faculty' },
  { id: 'ipeds',    label: 'IPEDS reporting' },
  { id: 'finance',  label: 'Finance' },
  { id: 'housing',  label: 'Housing' },
  { id: 'notes',    label: 'Notes' },
];

/* ============================================================
   Icons — Lucide-style 1.75px stroke.
   The IPEDS slot uses a text stamp (24×14) instead of a glyph;
   everything else is 14×14.
   ============================================================ */
const ICON_INTRINSIC_W = { ipeds: 24 };
const iconWidthFor = id => ICON_INTRINSIC_W[id] || 14;

function Icon({ name, color = 'currentColor' }) {
  const p = {
    viewBox: '0 0 24 24', width: 14, height: 14, fill: 'none',
    stroke: color, strokeWidth: 1.75,
    strokeLinecap: 'round', strokeLinejoin: 'round',
  };
  switch (name) {
    case 'ipeds': return (
      <svg viewBox="0 0 24 14" width="24" height="14" fill="none">
        <text x="12" y="10.5" textAnchor="middle"
              fill={color} stroke="none"
              fontFamily={T.fontMono}
              fontSize="8" fontWeight="700" letterSpacing="-0.15">
          IPEDS
        </text>
      </svg>
    );
    case 'overview': return (
      <svg {...p}>
        <rect x="3"  y="3"  width="7" height="7" />
        <rect x="14" y="3"  width="7" height="7" />
        <rect x="3"  y="14" width="7" height="7" />
        <rect x="14" y="14" width="7" height="7" />
      </svg>
    );
    case 'faculty': return (
      <svg {...p}>
        <circle cx="12" cy="8" r="4" />
        <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8" />
      </svg>
    );
    case 'finance': return (
      <svg {...p}>
        <path d="M3 20h18" />
        <path d="M5 16l4-4 3 3 7-7" />
        <path d="M14 8h5v5" />
      </svg>
    );
    case 'housing': return (
      <svg {...p}>
        <path d="M3 11l9-8 9 8" />
        <path d="M5 9v12h14V9" />
      </svg>
    );
    case 'notes': return (
      <svg {...p}>
        <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
        <path d="M14 3v6h6" />
        <path d="M8 14h8" />
        <path d="M8 17h5" />
      </svg>
    );
    default: return null;
  }
}

/* ============================================================
   Tab — one icon-only / icon+label row.
   • Right edge anchored to paper's left edge (parent uses
     alignItems: flex-end).
   • Width grows leftward when isOpen is true.
   • When isActive, width grows by ACTIVE_OUT + ACTIVE_INTO_PAPER
     and the tab is pulled rightward via negative marginRight
     so it overhangs under the paper.
   ============================================================ */
function InkTab({ tab, isActive, isOpen, onClick, onMouseEnter }) {
  const [hovering, setHovering] = useState(false);
  const iconW = iconWidthFor(tab.id);

  const baseW   = isOpen ? F.EXPANDED_W : F.COLLAPSED_W;
  const width   = baseW + (isActive ? F.ACTIVE_OUT + F.ACTIVE_INTO_PAPER : 0);
  const iconLeft = (F.COLLAPSED_W - iconW) / 2;

  const bg = isActive
    ? T.paper
    : (hovering ? F.HOVER_BG : F.INACTIVE_BG);

  return (
    <button
      type="button"
      role="tab"
      aria-selected={isActive}
      onClick={onClick}
      onMouseEnter={(e) => { setHovering(true);  onMouseEnter && onMouseEnter(e); }}
      onMouseLeave={()  => setHovering(false)}
      style={{
        appearance: 'none', border: 0, padding: 0,
        position: 'relative',
        width,
        height: F.TAB_H,
        marginRight: isActive ? -F.ACTIVE_INTO_PAPER : 0,
        background: bg,
        color: T.ink,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'flex-start',
        paddingLeft:  iconLeft,
        paddingRight: isActive ? F.ACTIVE_INTO_PAPER : 0,
        cursor: isActive ? 'default' : 'pointer',
        zIndex: isActive ? 3 : 1,
        transition: `width ${F.DUR}ms ${F.EASE}, background ${F.DUR}ms ease`,
        // The clip-path keeps the active tab's halo shadow from
        // bleeding rightward onto the white paper.
        clipPath:        isActive ? 'inset(-24px 0 -24px -40px)' : 'none',
        WebkitClipPath:  isActive ? 'inset(-24px 0 -24px -40px)' : 'none',
        boxShadow: isActive
          ? [
              '0 -3px 8px -4px rgba(14,14,14,0.16)',
              '0  3px 8px -4px rgba(14,14,14,0.16)',
              '-3px 0 8px -3px rgba(14,14,14,0.16)',
            ].join(', ')
          : 'none',
        outline: 'none',
        overflow: 'hidden',
      }}
    >
      <span style={{
        flex: '0 0 auto',
        display: 'inline-flex',
        alignItems: 'center',
        width: iconW,
      }}>
        <Icon name={tab.id} color={T.ink} />
      </span>

      <span style={{
        marginLeft: 12,
        fontFamily: T.fontMono, fontSize: 10,
        letterSpacing: '0.14em', textTransform: 'uppercase',
        fontWeight: isActive ? 700 : 500,
        whiteSpace: 'nowrap',
        color: T.ink,
        opacity:   isOpen ? 1 : 0,
        transform: isOpen ? 'translateX(0)' : 'translateX(-4px)',
        // Label has a small entry delay on open so the width
        // transition leads; on close it leaves immediately.
        transition:
          `opacity ${F.DUR}ms ${F.EASE} ${isOpen ? '60ms' : '0ms'},` +
          `transform ${F.DUR}ms ${F.EASE}`,
        backgroundImage:      isActive ? T.hl : 'none',
        backgroundRepeat:     'no-repeat',
        backgroundSize:       '100% 70%',
        backgroundPosition:   '0 65%',
        padding: '2px 4px',
      }}>
        {tab.label}
      </span>
    </button>
  );
}

/* ============================================================
   Desk + paper backdrop.
   ============================================================ */
function PaperBody() {
  return (
    <>
      <div style={{
        fontFamily: T.fontMono, fontSize: 10.5,
        letterSpacing: '0.16em', textTransform: 'uppercase',
        color: T.mute,
      }}>
        Section · faculty · 09:14
      </div>
      <div style={{
        fontFamily: T.fontDisplay, fontWeight: 500,
        fontSize: 40, lineHeight: 0.96, letterSpacing: '-0.02em',
        margin: '14px 0 6px',
      }}>
        Senior hires —<br />
        <span style={{
          backgroundImage:    T.hl,
          backgroundRepeat:   'no-repeat',
          backgroundSize:     '100% 65%',
          backgroundPosition: '0 72%',
          padding: '0 6px',
        }}>ahead of plan.</span>
      </div>
      <hr style={{ height: 0, border: 0, borderTop: `1px solid ${T.hair}`, margin: '20px 0' }} />
      <p style={{
        fontSize: 14.5, lineHeight: 1.6, margin: 0,
        color: '#2D2D2D', maxWidth: '32ch',
      }}>
        Three searches closed this week. Two more sit in final round.
        I'd open a sub-section on STEM concentration before Friday.
      </p>
      <div style={{ display: 'flex', gap: 8, marginTop: 22, flexWrap: 'wrap' }}>
        <Tag>Cohort 2026</Tag>
        <Tag>Coverage 96%</Tag>
      </div>
    </>
  );
}

function Tag({ children }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center',
      padding: '3px 8px',
      border: `1.25px solid ${T.ink}`,
      background: '#FFF', color: T.ink,
      fontFamily: T.fontMono, fontSize: 10.5,
      letterSpacing: '0.1em', textTransform: 'uppercase', lineHeight: 1,
    }}>{children}</span>
  );
}

/* ============================================================
   App — the rail + paper, sized to the viewport.
   ============================================================ */
function App() {
  const [hovered,   setHovered]   = useState(false);
  const [active,    setActive]    = useState(1); // Faculty
  const [activeOpen, setActiveOpen] = useState(false);

  // Stagger: when the rail loses hover, inactive tabs collapse
  // immediately, but the active tab stays open for ACTIVE_OPEN_HOLD ms.
  useEffect(() => {
    if (hovered) {
      setActiveOpen(true);
      return;
    }
    const t = setTimeout(() => setActiveOpen(false), F.ACTIVE_OPEN_HOLD);
    return () => clearTimeout(t);
  }, [hovered]);

  const railWidth = hovered ? F.EXPANDED_W : F.COLLAPSED_W;

  return (
    <div style={{
      position: 'relative',
      width: '100%', height: '100%',
      background: 'var(--desk)',
      // dotted desk background — pure CSS, no asset
      backgroundImage: 'radial-gradient(circle, rgba(14,14,14,0.07) 1px, transparent 1.2px)',
      backgroundSize: '22px 22px',
      backgroundPosition: '0 0',
      overflow: 'hidden',
    }}>
      {/* TABS RAIL — its right edge is anchored at PAPER_LEFT.
          Tabs inside use alignItems: flex-end so each tab grows
          leftward when its width changes. */}
      <div
        role="tablist"
        aria-orientation="vertical"
        onMouseEnter={() => setHovered(true)}
        onMouseLeave={() => setHovered(false)}
        style={{
          position: 'absolute',
          left: F.PAPER_LEFT - railWidth,
          top:  F.RAIL_TOP,
          width: railWidth,
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'flex-end',
          transition: `left ${F.DUR}ms ${F.EASE}, width ${F.DUR}ms ${F.EASE}`,
        }}
      >
        {TABS.map((t, i) => {
          const isActive = i === active;
          // Active tab stays open through the stagger hold; inactive
          // tabs follow the rail's hover state directly.
          const isOpen = isActive ? activeOpen : hovered;
          return (
            <InkTab
              key={t.id}
              tab={t}
              isActive={isActive}
              isOpen={isOpen}
              onClick={() => setActive(i)}
            />
          );
        })}
      </div>

      {/* PAPER */}
      <div style={{
        position: 'absolute',
        left: F.PAPER_LEFT, top: 24, right: 24, bottom: 24,
        background: T.paper,
        boxShadow: T.paperShadow,
        padding: '28px 32px',
        zIndex: 3,
      }}>
        <PaperBody />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
