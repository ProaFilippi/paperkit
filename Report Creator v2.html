<script type="text/babel">
const { useState, useMemo } = React;
const { ink, mute, hair, hairS, teal, tealD, display, body: bodyFont, mono } = PK;

/* =============================================================

const CARD_TYPES = [

  { id: "big",       label: "Big number",       span: 4, needs: 1, glyph: BigGlyph },

const VARIABLES = [

/* =============================================================
   Glyphs — tiny abstract previews for the card library
   ============================================================= */
const GLYPH_W = 80, GLYPH_H = 44;
function glyphProps() {
  return {
    viewBox: `0 0 ${GLYPH_W} ${GLYPH_H}`,
    width: GLYPH_W, height: GLYPH_H,
    style: { display: "block" },
  };
}

function KpiGlyph() {
  return (

      <rect x="6" y="6"  width="22" height="3"   fill={mute} />
      <rect x="6" y="13" width="32" height="9"   fill={ink} />
      <rect x="6" y="26" width="14" height="2"   fill={mute} />
      <polyline points="44,30 52,28 60,24 68,18 74,14"

      <circle cx="74" cy="14" r="2" fill={teal} stroke="#FFFFFF" strokeWidth="1" />
    </svg>
  );
}
function BigGlyph() {
  return (

      <rect x="6" y="6"  width="20" height="3"  fill={mute} />
      <rect x="6" y="14" width="50" height="20" fill={ink} />

    </svg>

}
function CompareGlyph() {

      <rect x="6" y="12" width="68" height="6"   fill="#F4F2EC" />
      <rect x="6" y="12" width="58" height="6"   fill={teal} />
      <rect x="6" y="24" width="14" height="2.5" fill={mute} />
      <rect x="6" y="30" width="68" height="6"   fill="#F4F2EC" />
      <rect x="6" y="30" width="40" height="6"   fill="rgba(14,14,14,0.40)" />
    </svg>
  );
}
function TrendGlyph() {
  return (
    <svg {...glyphProps()}>
      <line x1="6" y1="36" x2="74" y2="36" stroke={hair} />
      <path d="M 6,28 L 18,26 L 30,24 L 42,22 L 54,20 L 66,18 L 74,17 L 74,28 L 66,30 L 54,32 L 42,34 L 30,35 L 18,36 L 6,36 Z"
            fill="rgba(14,14,14,0.06)" />
      <path d="M 6,28 L 18,26 L 30,24 L 42,22 L 54,20 L 66,18 L 74,17"
            fill="none" stroke="rgba(14,14,14,0.30)" strokeWidth="0.8" strokeDasharray="3 2" />
      <path d="M 6,30 L 18,25 L 30,22 L 42,17 L 54,12 L 66,9 L 74,7"
            fill="none" stroke={teal} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx="74" cy="7" r="2.4" fill={teal} stroke="#FFFFFF" strokeWidth="1" />
    </svg>
  );
}
function RankingGlyph() {
  const rows = [
    { w: 64, you: false }, { w: 56, you: false }, { w: 50, you: true },
    { w: 44, you: false }, { w: 36, you: false },
  ];
  return (
    <svg {...glyphProps()}>
      {rows.map((r, i) => {
        const y = 6 + i * 7;
        return (
          <g key={i}>
            <rect x="6" y={y} width="8" height="4" fill={mute} opacity={r.you ? 1 : 0.6} />
            <rect x="18" y={y} width={r.w} height="4" fill={r.you ? teal : "rgba(14,14,14,0.30)"} />
          </g>
        );
      })}
    </svg>
  );
}
function DistGlyph() {
  const bars = [4, 7, 11, 14, 16, 12, 8, 5, 3];
  return (
    <svg {...glyphProps()}>
      {bars.map((h, i) => {
        const x = 6 + i * 8;
        const isYou = i === 4;
        return (
          <rect key={i} x={x} y={38 - h} width="6" height={h}
                fill={isYou ? teal : "rgba(14,14,14,0.22)"} />
        );
      })}
      <line x1="6" y1="38" x2="74" y2="38" stroke={hairS} />
    </svg>
  );
}
function DonutGlyph() {
  return (
    <svg {...glyphProps()}>
      <circle cx={GLYPH_W/2} cy={GLYPH_H/2 + 2} r="14"
              fill="none" stroke="rgba(14,14,14,0.18)" strokeWidth="6" />
      <path d={`M ${GLYPH_W/2} ${GLYPH_H/2 - 12}
                A 14 14 0 0 1 ${GLYPH_W/2 + 13.3} ${GLYPH_H/2 + 6.7}`}

            fontFamily={mono} fontSize="6.5" fontWeight="600"

    </svg>
  );
}
function MultiGlyph() {
  return (
    <svg {...glyphProps()}>
      {[0, 1, 2, 3].map(c => [0, 1].map(r => {
        const x = 6 + c * 18;
        const y = 6 + r * 17;
        const highlight = (c === 0 && r === 0) || (c === 2 && r === 1);
        return (
          <g key={`${c}-${r}`}>
            <rect x={x} y={y} width="14" height="13"
                  fill={highlight ? "rgba(74,133,128,0.14)" : "#F4F2EC"}
                  stroke={highlight ? "rgba(74,133,128,0.45)" : hair}
                  strokeWidth="0.75" />
            <rect x={x + 2} y={y + 3} width="6" height="2"
                  fill={highlight ? tealD : mute} />
            <rect x={x + 2} y={y + 7} width="9" height="3"
                  fill={highlight ? teal : ink} />
          </g>
        );
      }))}
    </svg>
  );
}
function BulletGlyph() {
  return (
    <svg {...glyphProps()}>
      <rect x="6" y="6"  width="22" height="2.5" fill={mute} />
      <rect x="6"  y="16" width="22" height="14" fill="rgba(14,14,14,0.06)" />
      <rect x="28" y="16" width="22" height="14" fill="rgba(14,14,14,0.12)" />
      <rect x="50" y="16" width="24" height="14" fill="rgba(14,14,14,0.18)" />
      <rect x="6" y="20" width="52" height="6" fill={teal} />
      <line x1="64" y1="13" x2="64" y2="33" stroke={ink} strokeWidth="1.6" />
    </svg>
  );
}
function VarGlyph() {
  const items = [
    { l: -1, w: 18, side: "L", colored: false },
    { l:  1, w: 26, side: "R", colored: true  },
    { l: -1, w: 14, side: "L", colored: false },
    { l:  1, w: 12, side: "R", colored: true  },
  ];
  return (
    <svg {...glyphProps()}>
      <line x1={GLYPH_W/2} y1="4" x2={GLYPH_W/2} y2="40"
            stroke={mute} strokeDasharray="2 2" />
      {items.map((it, i) => {
        const y = 6 + i * 8;
        const x = it.side === "L" ? GLYPH_W/2 - it.w : GLYPH_W/2;
        return (
          <rect key={i} x={x} y={y} width={it.w} height="5"

        );
      })}
    </svg>
  );
}
function NoteGlyph() {
  return (
    <svg {...glyphProps()}>
      <rect x="4" y="4" width={GLYPH_W - 8} height={GLYPH_H - 8}
            fill="none" stroke={hair} strokeDasharray="3 2" />
      <text x="10" y="16" fontFamily={mono} fontSize="8" fontWeight="700"
            fill={ink} letterSpacing="0.8">Aa</text>
      <rect x="10" y="22" width="46" height="2" fill="rgba(14,14,14,0.40)" />
      <rect x="10" y="28" width="58" height="2" fill="rgba(14,14,14,0.40)" />
      <rect x="10" y="34" width="38" height="2" fill="rgba(14,14,14,0.40)" />
    </svg>
  );
}
function SpacerGlyph() {
  return (
    <svg {...glyphProps()}>
      <line x1="6" y1={GLYPH_H/2} x2={GLYPH_W - 6} y2={GLYPH_H/2}
            stroke={mute} />
      <circle cx={GLYPH_W/2} cy={GLYPH_H/2} r="3.5"
              fill="#FFFFFF" stroke={ink} />
    </svg>
  );
}

/* =============================================================

/* =============================================================
   Editor — main app
   ============================================================= */
function App() {
  const [report, setReport] = useState(initialReport);
  const [selectedCardId, setSelectedCardId] = useState("c1");
  const [hovered, setHovered] = useState(null);
  const [search, setSearch] = useState("");
  const [reportTitle, setReportTitle] = useState("Stanford · graduation read · Q3 cabinet");
  const [tab, setTab] = useState("variables"); // variables | cards

  const selectedCard = selectedCardId ? report.find(c => c.id === selectedCardId) : null;

  const addCard = (typeId, insertAt) => {
    const id = `c${Date.now().toString(36)}`;
    const newCard = { id, type: typeId, variables: [] };
    setReport(prev => {
      if (insertAt == null) return [...prev, newCard];
      const next = [...prev]; next.splice(insertAt, 0, newCard); return next;
    });
    setSelectedCardId(id);
    setTab("variables");
  };

  const removeCard = (id) => {
    setReport(prev => prev.filter(c => c.id !== id));
    if (selectedCardId === id) setSelectedCardId(null);
  };

  const toggleVariable = (cardId, varId) => {
    setReport(prev => prev.map(c => {
      if (c.id !== cardId) return c;
      const has = c.variables.includes(varId);
      const t = CARD_TYPES.find(t => t.id === c.type);
      let next;
      if (has) next = c.variables.filter(v => v !== varId);
      else if (t.needs === 1) next = [varId];
      else next = [...c.variables, varId];
      return { ...c, variables: next };
    }));
  };

  const setSpan = (cardId, span) => {
    setReport(prev => prev.map(c => c.id === cardId ? { ...c, span } : c));
  };

  const filteredVars = useMemo(() => {
    if (!search.trim()) return VARIABLES;
    const q = search.toLowerCase();
    return VARIABLES.filter(v => v.label.toLowerCase().includes(q) || v.group.toLowerCase().includes(q));
  }, [search]);

  const varsByGroup = useMemo(() => {
    const g = {};
    filteredVars.forEach(v => { (g[v.group] = g[v.group] || []).push(v); });
    return g;
  }, [filteredVars]);

  const totalVars = report.reduce((a, c) => a + c.variables.length, 0);

  return (
    <>
      <Navbar reportTitle={reportTitle} />
      <div style={{
        padding: "26px 28px 64px",
      }}>
        <Paper>
          <PaperTopBar
            cards={report.length}
            vars={totalVars}
          />
          <div style={{
            display: "flex",
            minHeight: 720,
          }}>
            <LeftTabRail tab={tab} setTab={setTab} />
            <Drawer>
              {tab === "variables" && (
                <VariablePicker
                  search={search} setSearch={setSearch}
                  varsByGroup={varsByGroup}
                  activeVars={selectedCard ? selectedCard.variables : []}
                  onToggle={(v) => selectedCard && toggleVariable(selectedCard.id, v.id)}
                  hasSelection={!!selectedCard}
                  selectedCard={selectedCard}
                />
              )}
              {tab === "cards" && (
                <CardLibrary
                  types={CARD_TYPES}
                  onAdd={(t) => addCard(t.id)}
                  hovered={hovered}
                  setHovered={setHovered}
                />
              )}
            </Drawer>
            <ReportCanvas
              reportTitle={reportTitle}
              setReportTitle={setReportTitle}
              report={report}
              selectedCardId={selectedCardId}
              onSelect={setSelectedCardId}
              onRemove={removeCard}
              onSetSpan={setSpan}
              onAddSlot={(i) => addCard("kpi", i)}
            />
          </div>
        </Paper>
      </div>
    </>
  );
}

/* ---------- Paper (the floating page) ---------------------- */
function Paper({ children }) {
  return (
    <div style={{
      maxWidth: 1480,
      margin: "0 auto",
      background: "#FFFFFF",
      boxShadow:
        "0 1px 2px rgba(14,14,14,0.04), 0 12px 26px -8px rgba(14,14,14,0.10), 0 38px 60px -22px rgba(14,14,14,0.16)",
      display: "flex", flexDirection: "column",
    }}>
      {children}
    </div>
  );
}

/* ---------- Paper top bar — context selectors + actions ---- *
   Three selector cells on the left answer "what's the scope" —
   Institution, Peer group, and the cohort/reporting year. Actions
   on the right are the verbs. Counts sit between as a quiet
   status echo.
 * ----------------------------------------------------------- */
function PaperTopBar({ cards, vars }) {
  return (
    <div style={{
      padding: "16px 28px",
      borderBottom: `1px solid ${hair}`,
      display: "flex", alignItems: "center", gap: 28,
      flexWrap: "wrap",
    }}>
      <ContextCell label="Institution" value="Stanford University" meta="· 243744" />
      <span style={{ width: 1, height: 28, background: hair }} />
      <ContextCell label="Peer group" value="R1 Private" meta="· 22 inst." />
      <span style={{ width: 1, height: 28, background: hair }} />
      <ContextCell label="Cohort" value="2026" meta="· reporting FY25" />

      <span style={{ flex: 1 }} />

      <div style={{
        display: "flex", alignItems: "center", gap: 14,
        fontFamily: mono, fontSize: 10, color: mute,
        letterSpacing: "0.14em", textTransform: "uppercase",
      }}>
        <span>{cards} card{cards === 1 ? "" : "s"}</span>
        <span style={{ width: 1, height: 10, background: hair }} />
        <span>{vars} variable{vars === 1 ? "" : "s"}</span>
      </div>

      <span style={{ width: 1, height: 18, background: hair }} />

      <button style={tbtnGhost}>Preview</button>
      <button style={tbtnSecondary}>Save draft</button>
      <button style={tbtnPrimary}>Publish →</button>
    </div>
  );
}

function ContextCell({ label, value, meta }) {
  const [hover, setHover] = useState(false);
  return (
    <button
      type="button"
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        appearance: "none", background: "transparent", border: 0, cursor: "pointer",
        textAlign: "left", padding: "2px 0",
        display: "inline-flex", flexDirection: "column", gap: 4,
      }}
    >
      <span style={{
        fontFamily: mono, fontSize: 9, letterSpacing: "0.16em",
        textTransform: "uppercase", color: mute, fontWeight: 500,
      }}>{label}</span>
      <span style={{
        display: "inline-flex", alignItems: "center", gap: 8,
        fontFamily: display, fontSize: 16, fontWeight: 500,
        letterSpacing: "-0.005em", color: ink,
        borderBottom: `1.25px solid ${hover ? ink : "transparent"}`,
        transition: "border-color 120ms",
        paddingBottom: 1,
      }}>
        {value}
        {meta && <span style={{
          color: mute, fontFamily: mono, fontSize: 10,
          fontWeight: 400, letterSpacing: "0.06em",
        }}>{meta}</span>}
        <span style={{ color: mute, fontFamily: mono, fontSize: 10, marginLeft: 2 }}>▾</span>
      </span>
    </button>
  );
}

/* ---------- Left tab rail (inside the paper) --------------- *
   Two vertical tabs at the left edge of the paper. Icon + tiny
   rotated mono label. Active tab has a 2px ink rule on its outer
   edge — the rule on the LEFT (paper-edge) side, since that's
   where the rail meets the desk.
 * ----------------------------------------------------------- */
function LeftTabRail({ tab, setTab }) {
  const tabs = [
    { id: "variables", label: "Variables", Icon: VariablesIcon },
    { id: "cards",     label: "Cards",     Icon: CardsIcon },
  ];
  return (
    <div style={{
      flex: "0 0 52px",
      borderRight: `1px solid ${hair}`,
      display: "flex", flexDirection: "column",
      background: "#FFFFFF",
    }}>
      {tabs.map((t, i) => {
        const active = tab === t.id;
        const { Icon } = t;
        return (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              appearance: "none", border: 0,
              background: active ? "#FFFFFF" : "#F8F6F0",
              padding: "20px 0 22px",
              borderTop: i === 0 ? "none" : `1px solid ${hair}`,
              cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 12,
              position: "relative",
              transition: "background 160ms ease",
            }}
            onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = "#FBFAF4"; }}
            onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = "#F8F6F0"; }}
          >
            {/* active rule on the outer (left) edge */}
            {active && <span style={{
              position: "absolute", left: 0, top: 0, bottom: 0,
              width: 2, background: ink,
            }} />}
            <Icon color={active ? ink : mute} />
            <span style={{
              writingMode: "vertical-rl",
              transform: "rotate(180deg)",
              fontFamily: mono, fontSize: 9.5,
              letterSpacing: "0.18em", textTransform: "uppercase",
              color: active ? ink : mute,
              fontWeight: active ? 700 : 500,
              backgroundImage: active ? "var(--fp-hl)" : "none",
              backgroundRepeat: "no-repeat",
              backgroundSize: "100% 65%",
              backgroundPosition: "0 30%",
              padding: "2px 0",
            }}>{t.label}</span>
          </button>
        );
      })}
      {/* filler so the rail extends to the bottom of the paper body */}
      <div style={{ flex: 1, background: "#F8F6F0" }} />
    </div>
  );
}

function VariablesIcon({ color = ink }) {
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"

      <circle cx="5" cy="12" r="1.4" fill={color} />

function CardsIcon({ color = ink }) {

    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"

      <rect x="3"  y="3"  width="8" height="8" />
      <rect x="13" y="3"  width="8" height="8" />

/* ---------- Drawer — fixed 300px column inside paper -------- */
function Drawer({ children }) {
  return (
    <div style={{
      flex: "0 0 300px",

/* ---------- Card library (inside drawer) ------------------- */
function CardLibrary({ types, onAdd, hovered, setHovered }) {

      <div style={{ padding: "0 10px 12px" }}>

          margin: 0, fontFamily: bodyFont, fontSize: 12.5,
          color: mute, lineHeight: 1.5,
        }}>

          <strong style={{ color: ink }}>Variables</strong> to wire it up.

      </div>
      <div style={{
        display: "grid",
        gridTemplateColumns: "1fr 1fr",
        gap: 8,
      }}>
        {types.map(t => {
          const Glyph = t.glyph;
          const hov = hovered === t.id;
          return (
            <button key={t.id}
              onMouseEnter={() => setHovered(t.id)}
              onMouseLeave={() => setHovered(null)}
              onClick={() => onAdd(t)}
              style={{
                appearance: "none",
                padding: 0,
                background: "#FFFFFF",
                border: `1px solid ${hov ? ink : hair}`,
                color: ink, cursor: "pointer",
                textAlign: "left",
                display: "flex", flexDirection: "column",
                overflow: "hidden",

                background: hov ? "#FBFAF4" : "#FAFAF7",
                display: "flex", alignItems: "center", justifyContent: "center",

                transition: "background 120ms",
              }}>
                <Glyph />
              </div>
              <div style={{ padding: "8px 10px" }}>
                <div style={{
                  fontFamily: bodyFont, fontSize: 12, color: ink, fontWeight: 500,
                  lineHeight: 1.2,
                }}>{t.label}</div>
                <div style={{
                  marginTop: 4,
                  fontFamily: mono, fontSize: 9, color: mute,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                }}>

}

/* ---------- Variable picker (inside drawer) ---------------- */
function VariablePicker({ search, setSearch, varsByGroup, activeVars, onToggle, hasSelection, selectedCard }) {
  return (
    <div style={{ padding: "16px 0 24px" }}>
      <div style={{ padding: "0 16px 12px" }}>
        <Stamp m style={{ display: "block", marginBottom: 6 }}>Variables</Stamp>
        {/* selected-card context */}
        <div style={{
          padding: "10px 12px",
          background: hasSelection ? "rgba(74,133,128,0.06)" : "#FAFAF7",
          border: `1px solid ${hasSelection ? "rgba(74,133,128,0.45)" : hair}`,
          borderRadius: 2,
        }}>
          <Stamp m style={{ display: "block", marginBottom: 4 }}>
            {hasSelection ? "Editing" : "Pick a card on the right"}
          </Stamp>
          {hasSelection ? (
            <>
              <div style={{ fontFamily: bodyFont, fontSize: 13, color: ink, fontWeight: 600 }}>
                {CARD_TYPES.find(t => t.id === selectedCard.type)?.label}
              </div>
              <div style={{ marginTop: 4, fontFamily: mono, fontSize: 10, color: mute, letterSpacing: "0.06em" }}>
                {selectedCard.variables.length} variable{selectedCard.variables.length === 1 ? "" : "s"}
              </div>
            </>
          ) : (
            <div style={{ fontFamily: bodyFont, fontSize: 12.5, color: mute, lineHeight: 1.5 }}>
              Selecting a card lets you toggle the variables it shows.
            </div>
          )}
        </div>
      </div>

      <div style={{ padding: "0 16px 10px" }}>
        <input
          type="text" placeholder="Search variables…"
          value={search} onChange={e => setSearch(e.target.value)}
          style={{
            width: "100%", padding: "8px 10px",
            border: `1px solid ${hair}`, outline: "none",
            background: "#FFFFFF",
            fontFamily: bodyFont, fontSize: 13, color: ink,
          }}
          onFocus={e => e.target.style.borderColor = ink}
          onBlur={e => e.target.style.borderColor = hair}
        />
      </div>

      {Object.entries(varsByGroup).map(([group, vars]) => (
        <div key={group} style={{ marginTop: 12 }}>
          <div style={{
            padding: "4px 16px",
            fontFamily: mono, fontSize: 9.5,
            letterSpacing: "0.14em", textTransform: "uppercase",
            color: mute,
          }}>{group} · {vars.length}</div>
          {vars.map(v => {
            const active = activeVars.includes(v.id);
            return (
              <button key={v.id}
                onClick={() => onToggle(v)}
                disabled={!hasSelection}
                style={{
                  appearance: "none", background: "transparent",
                  border: 0, width: "100%", textAlign: "left",
                  padding: "8px 16px",
                  cursor: hasSelection ? "pointer" : "default",
                  display: "grid",
                  gridTemplateColumns: "14px 1fr auto",
                  alignItems: "center", gap: 10,
                  opacity: hasSelection ? 1 : 0.55,
                  borderTop: `1px solid ${hair}`,
                  background: active ? "rgba(74,133,128,0.08)" : "transparent",
                }}
                onMouseEnter={(e) => { if (hasSelection && !active) e.currentTarget.style.background = "rgba(14,14,14,0.03)"; }}
                onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = "transparent"; }}
              >
                <span style={{
                  width: 12, height: 12,
                  background: active ? teal : "transparent",
                  border: `1.25px solid ${active ? teal : "rgba(14,14,14,0.30)"}`,
                  position: "relative",
                }}>
                  {active && (
                    <svg viewBox="0 0 10 10" style={{ position: "absolute", inset: 0, width: 10, height: 10, top: 1, left: 1 }}>
                      <polyline points="1,5 4,8 9,2" fill="none" stroke="#FFFFFF" strokeWidth="1.6" />
                    </svg>
                  )}
                </span>
                <span style={{
                  fontFamily: bodyFont, fontSize: 12.5, color: ink,
                  fontWeight: active ? 600 : 400,

                <span style={{
                  fontFamily: mono, fontSize: 10.5, color: mute,

        </div>
      ))}
    </div>
  );
}

/* ---------- Report canvas (the right side of paper) -------- */

        onRemove={onRemove}

}

function ReportHeader({ title, setTitle }) {

/* ---------- ReportGrid ------------------------------------- */
function ReportGrid({ report, selectedCardId, onSelect, onRemove, onSetSpan, onAddSlot }) {
  return (
    <div style={{
      display: "grid", gridTemplateColumns: "repeat(12, 1fr)",
      gap: 16,
    }}>
      {report.map((c) => {
        const type = CARD_TYPES.find(t => t.id === c.type);
        const span = c.span || type.span;
        return (
          <CardSlot
            key={c.id}
            card={c}
            type={type}
            span={span}
            isSelected={selectedCardId === c.id}
            onSelect={() => onSelect(c.id)}
            onRemove={() => onRemove(c.id)}
            onSetSpan={(s) => onSetSpan(c.id, s)}
          />
        );
      })}
      <button
        onClick={() => onAddSlot()}
        style={{
          appearance: "none",
          gridColumn: "span 12",
          padding: "32px",
          background: "transparent",
          border: `1.5px dashed ${hair}`,
          color: mute, cursor: "pointer",
          fontFamily: mono, fontSize: 11,
          letterSpacing: "0.14em", textTransform: "uppercase",
          fontWeight: 600,
          transition: "border-color 120ms, color 120ms, background 120ms",
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor = ink; e.currentTarget.style.color = ink; e.currentTarget.style.background = "rgba(14,14,14,0.02)"; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor = hair; e.currentTarget.style.color = mute; e.currentTarget.style.background = "transparent"; }}
      >
        + Add card
      </button>
    </div>
  );
}

/* ---------- CardSlot --------------------------------------- */
function CardSlot({ card, type, span, isSelected, onSelect, onRemove, onSetSpan }) {
  return (
    <div
      onClick={onSelect}
      style={{
        gridColumn: `span ${span}`,
        position: "relative",
        background: "#FFFFFF",
        border: `1px solid ${isSelected ? teal : hair}`,
        boxShadow: isSelected
          ? "0 0 0 2px rgba(74,133,128,0.12), 0 1px 2px rgba(14,14,14,0.04)"
          : "0 1px 2px rgba(14,14,14,0.04)",
        cursor: "pointer",
        transition: "border-color 120ms, box-shadow 120ms",
        minHeight: 160,
        display: "flex", flexDirection: "column",
      }}
    >
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "10px 14px",
        borderBottom: `1px solid ${hair}`,
      }}>
        <Stamp m>{type.label}</Stamp>
        {isSelected && (
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <SpanControl span={span} onSetSpan={onSetSpan} />
            <button onClick={(e) => { e.stopPropagation(); onRemove(); }}
              style={{
                appearance: "none", background: "transparent",
                border: `1px solid ${hair}`,
                color: mute, padding: "3px 8px",
                fontFamily: mono, fontSize: 10,
                letterSpacing: "0.10em", textTransform: "uppercase",
                cursor: "pointer", fontWeight: 600,
              }}
              onMouseEnter={e => { e.currentTarget.style.color = "#8B2F28"; e.currentTarget.style.borderColor = "#8B2F28"; }}
              onMouseLeave={e => { e.currentTarget.style.color = mute; e.currentTarget.style.borderColor = hair; }}
            >Remove</button>
          </div>
        )}
      </div>
      <CardPreview card={card} type={type} span={span} />
    </div>
  );
}

function SpanControl({ span, onSetSpan }) {
  const opts = [4, 6, 8, 12];
  return (
    <div style={{ display: "flex", border: `1px solid ${hair}` }}>
      {opts.map(s => (
        <button key={s} onClick={(e) => { e.stopPropagation(); onSetSpan(s); }}
          style={{
            appearance: "none", border: 0,
            background: span === s ? ink : "transparent",
            color: span === s ? "#FFFFFF" : mute,
            padding: "3px 9px",
            fontFamily: mono, fontSize: 10,
            letterSpacing: "0.04em",
            cursor: "pointer", fontWeight: 600,
          }}>{s}</button>
      ))}
    </div>
  );
}

            background: "#FAFAF7",
            display: "grid", placeItems: "center",
            fontFamily: bodyFont, fontSize: 12.5, color: mute,
          }}>
            {type.label} preview
          </div>
        </div>
      );
  }
}
